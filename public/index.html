<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/lifelog-icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/lifelog-icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F8FAFC" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Redirect old domain to new -->
    <script>
      (function () {
        if (window.location.hostname === "carelog.web.app") {
          var target =
            "https://lifelog.care" +
            window.location.pathname +
            window.location.search +
            window.location.hash;
          window.location.replace(target);
        }

        var path = window.location.pathname || "/";
        var isInstallRoute = path.indexOf("/install") === 0;
        var isInviteRoute =
          path.indexOf("/accept-invite") === 0 || path.indexOf("/invitation/") === 0;
        var isStandalone =
          window.matchMedia &&
          (window.matchMedia("(display-mode: standalone)").matches ||
            window.navigator.standalone === true);
        var userAgent = window.navigator.userAgent || "";
        var isIpadLike =
          window.navigator.platform === "MacIntel" && window.navigator.maxTouchPoints > 1;
        var isMobileBrowser = /Android|iPhone|iPod|Mobile/i.test(userAgent) || isIpadLike;

        if (isMobileBrowser && !isStandalone && !isInstallRoute && !isInviteRoute) {
          var nextPath = path === "/" ? "/login" : path + window.location.search + window.location.hash;
          window.location.replace("/install?next=" + encodeURIComponent(nextPath));
        }
      })();
    </script>

    <!-- SEO -->
    <title>Lifelog — Care Logging for Families</title>
    <meta
      name="description"
      content="Lifelog helps caregivers and parents log daily moments, behaviors, and milestones for children with developmental differences — and share them with their care team in real time."
    />

    <!-- Open Graph: controls link previews on WhatsApp, iMessage, Facebook -->
    <meta property="og:title" content="Lifelog — Care Logging for Families" />
    <meta
      property="og:description"
      content="Log behaviors, milestones, and daily moments in seconds. Share with therapists and caregivers in real time. Built by a caregiver, for caregivers."
    />
    <meta property="og:url" content="https://lifelog.care" />
    <meta property="og:type" content="website" />

    <!-- PWA -->
    <link rel="apple-touch-icon" sizes="192x192" href="%PUBLIC_URL%/lifelog-icon-192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
