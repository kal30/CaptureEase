<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F8FAFC" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Redirect old domain to new -->
    <script>
      (function () {
        if (window.location.hostname === "carelog.web.app") {
          var target =
            "https://lifelog.care" +
            window.location.pathname +
            window.location.search +
            window.location.hash;
          window.location.replace(target);
        }
      })();
    </script>

    <!-- SEO -->
    <title>lifelog — Care Logging for Families</title>
    <meta
      name="description"
      content="lifelog helps caregivers and parents log daily moments, behaviors, and milestones for children with developmental differences — and share them with their care team in real time."
    />

    <!-- Open Graph: controls link previews on WhatsApp, iMessage, Facebook -->
    <meta property="og:title" content="lifelog — Care Logging for Families" />
    <meta
      property="og:description"
      content="Log behaviors, milestones, and daily moments in seconds. Share with therapists and caregivers in real time. Built by a caregiver, for caregivers."
    />
    <meta property="og:url" content="https://lifelog.care" />
    <meta property="og:type" content="website" />

    <!-- PWA -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/captureez-icon-192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
